name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marryme
          POSTGRES_PASSWORD: marryme
          POSTGRES_DB: marryme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-secret-key-with-at-least-fifty-characters-long
      DJANGO_ENV: dev
      DEBUG: "True"
      DATABASE_URL: postgres://marryme:marryme@localhost:5432/marryme
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: ""
      META_ACCESS_TOKEN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pytest
        run: pytest --cov=apps --cov=core --cov-fail-under=80

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
